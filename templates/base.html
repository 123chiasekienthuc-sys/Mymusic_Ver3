<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyMusic - Ứng dụng nghe nhạc trực tuyến{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Global styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0a0a0f;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #0a0a0f 80%);
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(110, 69, 255, 0.3);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            text-transform: uppercase;
        }

        .user-info h4 {
            font-size: 0.8rem;
            color: #aaa;
            font-weight: 400;
        }

        .user-info p {
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-info small {
            font-size: 0.65rem;
            color: #6e45ff;
            display: block;
            margin-top: 2px;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: #8a8a9e;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(110, 69, 255, 0.15), rgba(255, 107, 107, 0.15));
            color: #fff;
            border-left: 3px solid #6e45ff;
        }

        .new-playlist-btn {
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            margin: 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
            width: 100%;
        }

        .new-playlist-btn:hover {
            transform: scale(1.02);
        }

        .category-section {
            margin-top: 8px;
        }

        .category-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5a5a72;
            padding: 0 16px;
            margin-bottom: 8px;
        }

        .category-item {
            padding: 10px 16px;
            color: #8a8a9e;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .category-item:hover,
        .category-item.active {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
        }

        .system-footer {
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 0;
            overflow-y: auto;
            padding: 24px 32px;
            position: relative;
        }

        .main-content::-webkit-scrollbar {
            width: 6px;
        }

        .main-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .main-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            color: white;
            font-size: 0.95rem;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(110, 69, 255, 0.5);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a5a72;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d0d0ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* Page Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: rgba(20, 20, 30, 0.4);
            padding: 15px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            background: rgba(20, 20, 30, 0.4);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .filter-tab {
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: #8a8a9e;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            color: white;
        }

        .filter-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            outline: none;
            min-width: 150px;
        }

        /* Grid Styles */
        .songs-grid, .composers-grid, .singers-grid, .recordings-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
        }

        .songs-grid {
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }

        .composers-grid {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .singers-grid {
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        }

        .recordings-grid {
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        }

        /* Card Styles */
        .song-card, .composer-card, .singer-card, .recording-card {
            background: rgba(20, 20, 30, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .song-card:hover, .composer-card:hover, .singer-card:hover, .recording-card:hover {
            transform: translateY(-4px);
            border-color: rgba(110, 69, 255, 0.3);
            background: rgba(30, 30, 40, 0.5);
        }

        .song-card::before, .composer-card::before, .singer-card::before, .recording-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            transform: translateX(-100%);
            transition: transform 0.3s;
        }

        .song-card:hover::before, .composer-card:hover::before, .singer-card:hover::before, .recording-card:hover::before {
            transform: translateX(0);
        }

        .song-icon, .composer-avatar, .singer-avatar, .recording-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 16px;
        }

        .song-title, .composer-name, .singer-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .song-composer, .song-category, .composer-meta, .singer-count {
            color: #6e45ff;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .song-stats, .composer-stats, .recording-details {
            display: flex;
            gap: 16px;
            color: #8a8a9e;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .view-btn, .edit-btn, .delete-btn, .play-btn, .add-recording-btn, .follow-btn {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            flex: 1;
        }

        .view-btn, .play-btn {
            background: rgba(110, 69, 255, 0.2);
            color: #6e45ff;
            border: 1px solid rgba(110, 69, 255, 0.3);
        }

        .edit-btn, .add-recording-btn {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .delete-btn {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .follow-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .view-btn:hover, .play-btn:hover, .edit-btn:hover, .add-recording-btn:hover, .delete-btn:hover, .follow-btn:hover {
            background: rgba(110, 69, 255, 0.3);
        }

        /* Artist Header */
        .artist-header, .song-header {
            background: linear-gradient(135deg, rgba(110, 69, 255, 0.2), rgba(255, 107, 107, 0.2));
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .artist-avatar-large, .song-icon-large {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }

        .artist-avatar-large img, .song-icon-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .artist-info, .song-info {
            flex: 1;
        }

        .artist-info h1, .song-info h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #d0d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .artist-meta, .song-meta {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            color: #b0b0c0;
        }

        .artist-bio {
            color: #b0b0c0;
            line-height: 1.6;
            margin-bottom: 24px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 16px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(20, 20, 30, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(110, 69, 255, 0.3);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #8a8a9e;
            font-size: 1rem;
        }

        /* Section Title */
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(20, 20, 30, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8a8a9e;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn.active {
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            color: white;
        }

        .page-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* Add Button */
        .add-btn {
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .add-btn:hover {
            transform: scale(1.02);
        }

        /* Form Styles */
        .form-container {
            background: rgba(20, 20, 30, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 32px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .form-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #d0d0ff;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #6e45ff;
            box-shadow: 0 0 0 3px rgba(110, 69, 255, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 40px;
        }

        .btn-submit {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(110, 69, 255, 0.3);
        }

        .btn-cancel {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: #8a8a9e;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .alert {
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .alert-success {
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid #4ecdc4;
            color: #4ecdc4;
        }

        .alert-danger {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        .alert-warning {
            background: rgba(255, 166, 0, 0.2);
            border: 1px solid #ffa600;
            color: #ffa600;
        }

        .file-input {
            position: relative;
        }

        .file-input input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(110, 69, 255, 0.3);
            border-radius: 16px;
            color: #8a8a9e;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-label:hover {
            border-color: #6e45ff;
            background: rgba(110, 69, 255, 0.1);
        }

        .file-name, .current-file, .current-image {
            margin-top: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            color: #4ecdc4;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .current-image img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
        }

        .preview-image {
            margin-top: 12px;
            max-width: 150px;
            max-height: 150px;
            border-radius: 12px;
            display: none;
        }

        .form-hint {
            display: block;
            margin-top: 5px;
            color: #8a8a9e;
            font-size: 0.75rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #8a8a9e;
            cursor: pointer;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: #6e45ff;
        }

        /* Lyrics Section */
        .lyrics-section, .related-grid {
            background: rgba(20, 20, 30, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 40px;
        }

        .lyrics-content {
            color: #b0b0c0;
            line-height: 1.8;
            white-space: pre-line;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .related-card {
            background: rgba(20, 20, 30, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .related-card:hover {
            transform: translateY(-4px);
            border-color: rgba(110, 69, 255, 0.3);
        }

        /* Bottom Player Bar */
        .bottom-player {
            position: fixed;
            bottom: 0;
            left: 280px;
            right: 0;
            height: 80px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 100;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .now-playing-img {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .now-playing-info h5 {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .now-playing-info p {
            font-size: 0.85rem;
            color: #8a8a9e;
        }

        .bottom-controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d0d0ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .control-btn.play {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6e45ff, #ff6b6b);
            border: none;
        }

        .bottom-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #8a8a9e;
            cursor: pointer;
        }

        .bottom-actions span:hover {
            color: #ff6b6b;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .songs-grid { grid-template-columns: repeat(2, 1fr); }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .sidebar .user-info h4,
            .sidebar .user-info p,
            .sidebar .user-info small,
            .sidebar .nav-item span:not(:first-child),
            .sidebar .category-item span:not(:first-child),
            .sidebar .new-playlist-btn span:first-child {
                display: none;
            }
            .sidebar .new-playlist-btn {
                font-size: 1.5rem;
                padding: 12px;
            }
            .main-content,
            .bottom-player {
                margin-left: 80px;
            }
            .bottom-player {
                left: 80px;
            }
            .songs-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .artist-header, .song-header { flex-direction: column; text-align: center; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app">
        {% include 'sidebar.html' %}
        
        <div class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Tìm kiếm bài hát, nghệ sĩ..." id="globalSearchInput">
                </div>
                <div class="top-actions">
                    <div class="icon-btn">🔔</div>
                    <div class="icon-btn">💬</div>
                    <div class="icon-btn">👤</div>
                </div>
            </div>

            {% block content %}{% endblock %}
        </div>

        {% include 'player.html' %}
    </div>

    <script>
        // Global search functionality
        document.getElementById('globalSearchInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    window.location.href = `/search?q=${encodeURIComponent(query)}`;
                }
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
